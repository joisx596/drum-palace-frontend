<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Palace UG</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
  background:#070f14;
  color:white;
  font-family: Arial;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

/* PRODUCT GRID */
.card{
  background: #e2dede;;
  border:none;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover{ transform:scale(1.03); }

.price{
  color:#00e5ff;
  font-weight:bold;
}

/* PRODUCT DETAIL PAGE */
.detail-page{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#050a0f;
  overflow:auto;
  z-index:999;
}

.detail-img{
  width:100%;
  height:320px;
  object-fit:cover;
}

.btn-glow{
  background:#00c2c7;
  border:none;
  color:black;
  font-weight:bold;
}

.qty-box{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:15px;
  margin:15px 0;
}

.qty-box button{
  width:40px;height:40px;
  border-radius:10px;
  border:none;
  font-size:20px;
}

.qty-num{
  font-size:20px;
}

/* FLOAT CART */
.cart-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f1e25;
  padding:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
<h4>DRUM PALACE</h4>
<i class="bi bi-cart"></i>
</div>

<!-- PRODUCTS -->
<div class="container mt-3">
<div class="row" id="products"></div>
</div>

<!-- PRODUCT DETAIL PAGE -->
<div class="detail-page" id="detailPage">

<img id="dimg" class="detail-img">

<div class="p-3">
<h3 id="dname"></h3>
<h4 class="price" id="dprice"></h4>

<p>
Premium quality instrument designed for stage and studio performance.
</p>

<!-- QTY -->
<div class="qty-box">
<button onclick="changeQty(-1)">-</button>
<div class="qty-num" id="qty">1</div>
<button onclick="changeQty(1)">+</button>
</div>

<!-- BUTTONS -->
<button class="btn btn-outline-light w-100 mb-2" onclick="addToCart()">
Add to Cart
</button>

<button class="btn btn-glow w-100" onclick="buyNow()">
Buy Now
</button>

<button class="btn btn-danger w-100 mt-2" onclick="closeDetail()">
Close
</button>

</div>
</div>

<script>

const API = "https://drum-palace-backend-2.onrender.com";

let products = [];
let selected = null;
let qty = 1;

/* LOAD PRODUCTS */
async function loadProducts(){
  const res = await fetch(API + "/products");
  products = await res.json();

  let html = "";

  products.forEach((p,i)=>{
    html += `
    <div class="col-6 mb-3">
      <div class="card" onclick="openDetail(${i})">
        <img src="${p.img}" style="height:140px;width:100%;object-fit:cover;">
        <div class="p-2">
          <h6>${p.name}</h6>
          <div class="price">UGX ${p.price}</div>
        </div>
      </div>
    </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

/* OPEN DETAIL PAGE */
function openDetail(index){
  selected = products[index];
  qty = 1;

  document.getElementById("dimg").src = selected.img;
  document.getElementById("dname").innerText = selected.name;
  document.getElementById("dprice").innerText = "UGX " + selected.price;
  document.getElementById("qty").innerText = qty;

  document.getElementById("detailPage").style.display = "block";
}

function closeDetail(){
  document.getElementById("detailPage").style.display = "none";
}

/* QTY */
function changeQty(val){
  qty += val;
  if(qty < 1) qty = 1;
  document.getElementById("qty").innerText = qty;
}

/* CART (simple) */
function addToCart(){
  alert("Added to cart: " + selected.name);
}

/* BUY NOW (MoMo READY) */
async function buyNow(){

  const phone = prompt("Enter MTN MoMo number (256...)");

  await fetch(API + "/pay",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      product:selected.name,
      price:selected.price * qty,
      phone:phone
    })
  });

  alert("Payment request sent to phone!");
  closeDetail();
}

loadProducts();

</script>

</body>
</html>
