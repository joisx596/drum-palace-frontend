<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Palace UG</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"><style>
body { background:#06181c; color:white; }
.navbar { background:#041214; }
.card { background:#0c2a2e; border:none; border-radius:15px; }
.card:hover { transform:scale(1.03); }
.btn-glow { background:#00c2c7; border:none; }
</style></head>
<body><nav class="navbar p-3">
<div class="container">
<h4>DRUM PALACE</h4>
</div>
</nav><div class="container mt-4">
<input id="phone" class="form-control mb-3" placeholder="Enter phone for MoMo (256...)"><h4>Categories</h4>
<div class="d-flex gap-3 mb-4">
<button class="btn btn-glow" onclick="filter('all')">All</button>
<button class="btn btn-glow" onclick="filter('Drum')">Drums</button>
<button class="btn btn-glow" onclick="filter('Guitar')">Guitars</button>
<button class="btn btn-glow" onclick="filter('Speaker')">Speakers</button>
</div><div class="row" id="products"></div>
</div><!-- ADMIN --><div class="container mt-5">
<h4>Admin Login</h4>
<input id="username" class="form-control mb-2" placeholder="Username">
<input id="password" type="password" class="form-control mb-2">
<button onclick="login()" class="btn btn-glow">Login</button>
</div><div class="container mt-5" id="admin" style="display:none">
<h4>Admin Dashboard</h4><h5>Add Product</h5>
<input id="pname" class="form-control mb-2" placeholder="Name">
<input id="pprice" class="form-control mb-2" placeholder="Price">
<input id="pimg" class="form-control mb-2" placeholder="Image URL">
<input id="pcat" class="form-control mb-2" placeholder="Category">
<button onclick="addProduct()" class="btn btn-warning">Add</button><hr>
<h5>Orders</h5>
<button onclick="loadOrders()" class="btn btn-success">Load Orders</button>
<div id="orders"></div>
</div><script>
const API = "https://drum-palace-backend.onrender.com";
const ADMIN = { username:"admin", password:"1234" };
let allProducts = [];

function login(){
if(username.value===ADMIN.username && password.value===ADMIN.password){
localStorage.setItem("admin",true);
document.getElementById("admin").style.display="block";
}
}

async function loadProducts(){
const res = await fetch(API+"/products");
allProducts = await res.json();
render(allProducts);
}

function render(products){
let html="";
products.forEach(p=>{
html+=`
<div class="col-md-3 mb-4">
<div class="card p-2">
<img src="${p.img}" class="img-fluid">
<h5>${p.name}</h5>
<p>UGX ${p.price}</p>
<button onclick="buy('${p.name}',${p.price})" class="btn btn-glow">Buy</button>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function filter(cat){
if(cat==='all') return render(allProducts);
render(allProducts.filter(p=>p.category===cat));
}

async function buy(name,price){
const phone = document.getElementById("phone").value;
await fetch(API+"/pay",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({product:name,price,phone})
});
alert("Payment request sent to your phone");
}

async function addProduct(){
await fetch(API+"/products",{
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
name:pname.value,
price:pprice.value,
img:pimg.value,
category:pcat.value
})
});
loadProducts();
}

async function loadOrders(){
const res = await fetch(API+"/orders");
const orders = await res.json();
let html="";
orders.forEach(o=>{
html+=`<div class="card p-2 mt-2">
${o.product} - ${o.price} (${o.status})
<button onclick="updateStatus(${o.id},'Completed')" class="btn btn-sm btn-success">Done</button>
</div>`;
});
document.getElementById("orders").innerHTML=html;
}

async function updateStatus(id,status){
await fetch(API+"/orders/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({status})
});
loadOrders();
}

if(localStorage.getItem("admin")) document.getElementById("admin").style.display="block";

loadProducts();
</script></body>
</html>
